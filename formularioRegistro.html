<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
  
  :root {
            --azul-principal: #1A4BCE; 
            --naranja-accent: #FF7A00; 
            --blanco: #FFFFFF;
            --borde-oscuro: #11369B;
            --gris-fondo: #F0F4F8;
        }

        body {
            background-color: var(--azul-principal);
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: radial-gradient(rgba(255,255,255,0.2) 2px, transparent 2px);
            background-size: 30px 30px;
        }

        .caja   {
            background-color: var(--blanco);
            width: 350px;
            padding: 40px;
            border-radius: 30px;
            border: 4px solid var(--borde-oscuro);
            box-shadow: 12px 12px 0px rgba(0,0,0,0.2);
            position: relative;
        }

       
        h1 {
            font-size: 1.8rem;
            color: var(--naranja-accent);
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            -webkit-text-stroke: 1px var(--azul-principal);
            text-shadow: 3px 3px 0px var(--azul-principal);
            letter-spacing: -1px;
        }

        
        label {
            display: block;
            color: var(--azul-principal);
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 5px;
            margin-left: 5px;
            text-transform: lowercase;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 3px solid var(--azul-principal);
            border-radius: 12px;
            background-color: var(--gris-fondo);
            font-size: 1rem;
            font-weight: bold;
            color: #333;
            transition: transform 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--naranja-accent);
            transform: scale(1.02);
        }

        input[type="submit"] {
            width: 100%;
            padding: 15px;
            background-color: var(--naranja-accent);
            border: 3px solid var(--azul-principal);
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 6px 0px var(--borde-oscuro);
            transition: all 0.1s;
            margin-top: 10px;
        }

        input[type="submit"]:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px var(--borde-oscuro);
        }

       

       
        .caja::after {
            content: "✦";
            position: absolute;
            top: -30px;
            right: -20px;
            font-size: 4rem;
            color: var(--naranja-accent);
            text-shadow: 3px 3px 0px var(--azul-principal);
            transform: rotate(15deg);
        }
   
</style>
    


    </style>
</head>
<body>
    <center>
        
    <form  class="caja" method="post">
        <h1>REGISTRO DE TAREAS</h1>
        <label for="">Nombre:</label>
        <input type="text" name="nombre"><br>
        <label for="">Descripcion:</label>
        <input type="text" name="descripcion"><br>
        <label for="">Estado:</label>
        <input type="text" name="estado"><br>
        <input type="submit" value="registrar"><br>
    </form>
    </center>
</body>
</html>
